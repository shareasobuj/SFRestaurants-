<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFRestaurants | Premium Food Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff4757; --dark: #0f172a; --glass: rgba(255,255,255,0.05); }
        body { background: var(--dark); color: white; font-family: 'Poppins', sans-serif; margin: 0; }
        
        /* Navbar */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; background: rgba(15,23,42,0.95); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--glass); }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; cursor: pointer; }

        /* Auth/Admin/Menu Sections */
        section { padding: 40px 8%; display: none; }
        section.active { display: block; }
        
        .container { max-width: 500px; margin: auto; background: var(--glass); padding: 30px; border-radius: 15px; border: 1px solid var(--primary); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 8px; }
        
        /* Product Grid */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .food-card { background: var(--glass); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .food-card img { width: 100%; height: 200px; object-fit: cover; }
        .btn { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
        
        /* Footer */
        footer { text-align: center; padding: 40px; background: #000; margin-top: 50px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">SFRESTAURANTS</div>
    <div class="nav-links">
        <a onclick="showPage('home')">Home</a>
        <a onclick="showPage('menu')">Menu</a>
        <a id="adminLink" onclick="showPage('admin')" style="display:none">Admin</a>
        <a id="authBtn" onclick="showPage('login')">Login</a>
        <a id="logoutBtn" onclick="handleLogout()" style="display:none">Logout</a>
    </div>
</nav>

<section id="home" class="active">
    <div style="text-align: center; padding: 100px 0;">
        <h1>Taste the Best in Atgharia</h1>
        <p>আমরা আছি আপনার সেবায়। অর্ডার করুন সেরা খাবার।</p>
        <button class="btn" style="width: 200px;" onclick="showPage('menu')">Explore Menu</button>
    </div>
</section>

<section id="menu">
    <h2 style="text-align: center;">Today's Specials</h2>
    <div class="menu-grid" id="menuDisplay"></div>
</section>

<section id="login">
    <div class="container">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPass" placeholder="Password">
        <button class="btn" onclick="handleLogin()">Login</button>
        <p onclick="showPage('signup')" style="cursor:pointer; margin-top:10px;">New user? Sign up here.</p>
    </div>
</section>

<section id="signup">
    <div class="container">
        <h2>Register</h2>
        <input type="text" id="userName" placeholder="Full Name">
        <input type="email" id="userEmail" placeholder="Email">
        <input type="text" id="userPhone" placeholder="Phone">
        <textarea id="userAddress" placeholder="Full Delivery Address"></textarea>
        <input type="password" id="userPass" placeholder="Password">
        <button class="btn" onclick="handleSignup()">Sign Up</button>
    </div>
</section>

<section id="admin">
    <div class="container">
        <h2>Admin Panel</h2>
        <input type="text" id="itemName" placeholder="Food Name">
        <input type="number" id="itemPrice" placeholder="Price (৳)">
        <input type="text" id="itemImg" placeholder="Image URL (Firebase Storage Link)">
        <button class="btn" onclick="addFoodItem()">Add to Menu</button>
    </div>
    <div style="margin-top: 50px;">
        <h3>Recent Orders</h3>
        <div id="orderList"></div>
    </div>
</section>

<footer>
    <p>© 2026 SFRestaurants | Atgharia, Pabna</p>
    <p>01310289829 | shareasobuj9829@gmail.com</p>
</footer>

<script type="module">
    // Firebase অ্যাপ ইম্পোর্ট করুন
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // আপনার ফায়ারবেজ কনফিগ এখানে বসান
    const firebaseConfig = {
        apiKey: "AIzaSyAxGlwu5sUsS2tTaQPjWLGshqU_6oKfulc",
  authDomain: "sfrestaurants-21981.firebaseapp.com",
  projectId: "sfrestaurants-21981",
  storageBucket: "sfrestaurants-21981.firebasestorage.app",
  messagingSenderId: "911326979607",
  appId: "1:911326979607:web:b0aac1acb3f4e8196a5e52",
  measurementId: "G-21VRSXM2X1"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Page Switching Logic
    window.showPage = (id) => {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    // Authentication Logic
    window.handleSignup = async () => {
        const email = document.getElementById('userEmail').value;
        const pass = document.getElementById('userPass').value;
        try {
            const res = await createUserWithEmailAndPassword(auth, email, pass);
            await addDoc(collection(db, "users"), {
                uid: res.user.uid,
                name: document.getElementById('userName').value,
                phone: document.getElementById('userPhone').value,
                address: document.getElementById('userAddress').value
            });
            alert("Success!");
            showPage('home');
        } catch (e) { alert(e.message); }
    };

    window.handleLogin = async () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            alert("Login Successful!");
            showPage('home');
        } catch (e) { alert("Wrong Credentials!"); }
    };

    window.handleLogout = () => signOut(auth);

    // UI Updates based on Auth
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('authBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline';
            if(user.email === "shareasobuj9829@gmail.com") { // আপনার ইমেইল দিয়ে এডমিন চেক
                document.getElementById('adminLink').style.display = 'inline';
            }
        } else {
            document.getElementById('authBtn').style.display = 'inline';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('adminLink').style.display = 'none';
        }
    });

    // Firestore Menu Management
    window.addFoodItem = async () => {
        await addDoc(collection(db, "menu"), {
            name: document.getElementById('itemName').value,
            price: document.getElementById('itemPrice').value,
            img: document.getElementById('itemImg').value,
            createdAt: new Date()
        });
        alert("Food Added!");
    };

    // Load Menu Real-time
    onSnapshot(query(collection(db, "menu"), orderBy("createdAt", "desc")), (snap) => {
        const display = document.getElementById('menuDisplay');
        display.innerHTML = "";
        snap.forEach(doc => {
            const data = doc.data();
            display.innerHTML += `
                <div class="food-card">
                    <img src="${data.img}">
                    <div style="padding:15px">
                        <h3>${data.name}</h3>
                        <p>৳ ${data.price}</p>
                        <button class="btn" onclick="alert('Order Feature Ready for Integration')">Order via Bkash/Cash</button>
                    </div>
                </div>`;
        });
    });

</script>
</body>
</html>
